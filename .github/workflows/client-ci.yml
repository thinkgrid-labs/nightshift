name: Client CI

on:
  push:
    branches: [main,dev]
    paths:
      - 'packages/**'
      - '.github/workflows/client-ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'packages/**'
      - '.github/workflows/client-ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Test & Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @backshift/schema
        run: pnpm --filter @backshift/schema build

      - name: Build @backshift/client (enforces 5kb size limit)
        run: pnpm --filter @backshift/client build

      - name: Test @backshift/client
        run: pnpm --filter @backshift/client test --coverage

      - name: Typecheck
        run: pnpm --filter @backshift/client typecheck
