name = "nightshift-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "cargo install -q worker-build && worker-build --release"

# Required secrets — set via: wrangler secret put <NAME>
# GA4_MEASUREMENT_ID
# GA4_API_SECRET
# SENTRY_DSN
# SENTRY_RELEASE
# SENTRY_ENVIRONMENT
# MIXPANEL_TOKEN
# POSTHOG_API_KEY
# POSTHOG_ENDPOINT (optional, for self-hosted)
# WEBHOOK_URL
# WEBHOOK_SECRET (optional)
# AMPLITUDE_API_KEY
# SEGMENT_WRITE_KEY
# FACEBOOK_PIXEL_ID
# FACEBOOK_ACCESS_TOKEN
# TIKTOK_PIXEL_CODE
# TIKTOK_ACCESS_TOKEN

# KV namespace for cross-request dedup — create with: wrangler kv:namespace create DEDUP
# Then replace the id below with the output from that command.
# Without this binding, dedup falls back to in-memory (same-batch only).
[[kv_namespaces]]
binding = "DEDUP"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

[vars]
# Non-secret config (can be overridden per environment)
# SENTRY_ENVIRONMENT = "production"

[env.staging]
name = "nightshift-worker-staging"

[env.staging.vars]
# SENTRY_ENVIRONMENT = "staging"
